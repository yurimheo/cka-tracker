<style>
.week-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;}
.wtab{padding:5px 12px;font-size:12px;font-weight:500;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
.wtab.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.wtab:hover:not(.on){background:var(--bg3);}
.week-goal-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;border-left:3px solid var(--accent);}
.week-goal-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;}
.week-goal-body{font-size:12px;color:var(--text2);line-height:1.6;}
.wchk-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.block-title.bs{background:var(--blue-bg);color:var(--blue-text);}
.block-title.bv{background:var(--green-bg);color:var(--green-text);}
.block-title.bl{background:var(--accent-bg);color:var(--accent);}
.block-title.br{background:var(--orange-bg);color:var(--orange-text);}
.block-title.bp{background:var(--red-bg);color:var(--red-text);}
.block-title.bd{background:var(--purple-bg);color:var(--purple-text);}
.block-title.bk{background:var(--gray-bg);color:var(--gray-text);}
.toggle-card.day-complete{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 18%,transparent),0 10px 24px color-mix(in srgb,var(--accent) 10%,transparent);}
.toggle-card.day-complete .toggle-head{background:linear-gradient(90deg,color-mix(in srgb,var(--accent-bg) 72%,transparent),var(--bg2));}
.toggle-card.day-complete .toggle-date,.toggle-card.day-complete .toggle-goal{color:var(--accent);}
.toggle-card.day-complete .toggle-time,.toggle-card.day-complete .day-state{color:var(--accent);}
.toggle-card.day-complete .type-bar{width:7px;background:var(--accent)!important;}
.toggle-card.day-complete .toggle-arrow{color:var(--accent);}
.toggle-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:3px;}
.day-state{font-size:11px;font-weight:700;color:var(--text3);white-space:nowrap;}
.sync-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.sync-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;} .sync-summary{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;list-style:none;} .sync-summary::-webkit-details-marker{display:none;} .sync-summary::after{content:"펼치기";font-size:11px;font-weight:500;color:var(--text3);} .sync-panel[open] .sync-summary{margin-bottom:10px;} .sync-panel[open] .sync-summary::after{content:"접기";}
.sync-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:10px;}
.sync-input{border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:8px;padding:8px 10px;font:inherit;font-size:12px;min-width:0;}
.sync-token{grid-column:span 2;}
.sync-auto{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:12px;}
.sync-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sync-btn{border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:8px;padding:7px 11px;font:inherit;font-size:12px;cursor:pointer;}
.sync-btn.primary{background:var(--text);border-color:var(--text);color:var(--bg);}
.sync-status{font-size:12px;color:var(--text3);}
.sync-status.err{color:var(--red-text);}
.callout-item{margin:7px 0;padding:9px 11px;border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;background:var(--accent-bg);color:var(--text2);font-size:12px;line-height:1.55;}
@media(max-width:640px){.sync-token{grid-column:auto;}}
</style>
</head>

let CW=0;
function sk(w,d,b,i){return`${w}-${d}-${b}-${i}`;}
function dayStats(wi,di){
  const day=WEEKS[wi].days[di];
  let total=0,done=0;
  day.blocks.forEach((b,bi)=>b.items.forEach((it,ii)=>{
    if(isCalloutItem(it))return;
    total++;
    if(stateGet(sk(wi,di,bi,ii))===true)done++;
  }));
  return{total,done,complete:total>0&&done===total};
}
function wck(w,c){return`wc-${w}-${c}`;}
function esc(s){return String(s).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function itemText(it){return typeof it==='string'?it:it.text;}
function isCalloutItem(it){
  if(typeof it==='object')return it.kind==='callout';
  return /필기노트에 (기록|정리)|오늘은 |무리하지|욕심내지|데이트 우선|랩은 \d+\/\d+로 이동|넘기기|심심하면만|마인드셋|완벽할 필요 없음|모르면 플래그|합격 커트라인/.test(it);
}
function actionKeys(){const keys=[];WEEKS.forEach((w,wi)=>{w.checks.forEach((_,ci)=>keys.push(wck(wi,ci)));w.days.forEach((d,di)=>d.blocks.forEach((b,bi)=>b.items.forEach((it,ii)=>{if(!isCalloutItem(it))keys.push(sk(wi,di,bi,ii));})));});return keys;}
function total(){return actionKeys().length;}
function cntChecked(){return actionKeys().filter(k=>stateGet(k)===true).length;}
function renderItem(it,wi,di,bi,ii){const text=itemText(it);if(isCalloutItem(it))return`<div class="callout-item">${esc(text)}</div>`;const k=sk(wi,di,bi,ii);const ck=stateGet(k)===true;return`<div class="cb-item"><input type="checkbox" class="cb" id="cb${wi}-${di}-${bi}-${ii}" ${ck?'checked':''} onchange="tItem(${wi},${di},${bi},${ii},this.checked)"><label class="cb-label${ck?' done':''}" for="cb${wi}-${di}-${bi}-${ii}">${text}</label></div>`;}
function updateProg(){
  const t=total(),c=cntChecked(),p=Math.round(c/t*100);
  document.getElementById('prog-fill').style.width=p+'%';
  document.getElementById('prog-pct').textContent=p+'%';
  document.getElementById('chk-count').textContent=c;
  document.getElementById('total-count').textContent=t;
}
function renderTabs(){
  document.getElementById('wtabs').innerHTML=WEEKS.map((w,i)=>`<button class="wtab${i===CW?' on':''}" onclick="selW(${i})">${w.w}</button>`).join('');
}
function selW(i){CW=i;renderTabs();renderWeek();}
function renderWeek(){
  const w=WEEKS[CW];
  document.getElementById('week-goal').innerHTML=`<div class="week-goal-card"><div class="week-goal-title">${w.w} · ${w.theme}</div><div class="week-goal-body">${w.goal}</div></div>`;
  document.getElementById('week-chk').innerHTML=`<div class="wchk-card"><div class="sec-label" style="margin-bottom:10px">이번 주 체크리스트</div>${w.checks.map((c,ci)=>{const k=wck(CW,ci);const ck=stateGet(k)===true;return`<div class="cb-item"><input type="checkbox" class="cb" id="wc${CW}-${ci}" ${ck?'checked':''} onchange="tWC(${CW},${ci},this.checked)"><label class="cb-label${ck?' done':''}" for="wc${CW}-${ci}">${c}</label></div>`;}).join('')}</div>`;
  document.getElementById('daylist').innerHTML=w.days.map((d,di)=>{
    const ds=dayStats(CW,di);
    const tc=TCFG[d.type]||TCFG.normal;
    const blocks=d.blocks.map((b,bi)=>{
      const bc=BCFG[b.cat]||BCFG.prep;
      const items=b.items.map((it,ii)=>renderItem(it,CW,di,bi,ii)).join('');
      return`<div class="block-sec"><span class="block-title ${bc.cls}">${bc.lbl} · ${b.title}</span><div class="block-items">${items}</div></div>`;
    }).join('');
    const memo=stateGet(`memo-${CW}-${di}`)||'';
    const dow=d.dow?`<div class="toggle-dow">${d.dow}요일</div>`:'';
    return`<div class="toggle-card${ds.complete?' day-complete':''}" data-day="${CW}-${di}"><div class="toggle-head" onclick="toggleCard(this)"><div class="type-bar" style="background:${tc.bar}"></div><div class="toggle-info"><div class="toggle-date">${d.d}</div>${dow}<span class="badge ${tc.bdg}" style="margin-top:5px;display:inline-block">${tc.lbl}</span></div><div class="toggle-main"><div class="toggle-goal">${d.goal}</div><div class="toggle-meta"><div class="toggle-time">⏱ ${d.time}</div><div class="day-state">${ds.done}/${ds.total}${ds.complete?' (완료)':''}</div></div></div><div class="toggle-arrow">▾</div></div><div class="toggle-body">${blocks}<div class="memo-wrap"><div class="memo-label">메모</div><textarea class="memo-textarea" placeholder="이 날 공부 메모..." oninput="saveMemo(${CW},${di},this.value)">${memo}</textarea></div></div></div>`;
  }).join('');
}
function refreshDayCompletion(wi,di){
  const card=document.querySelector(`[data-day="${wi}-${di}"]`);
  if(!card)return;
  const ds=dayStats(wi,di);
  card.classList.toggle('day-complete',ds.complete);
  const state=card.querySelector('.day-state');
  if(state)state.textContent=`${ds.done}/${ds.total}${ds.complete?' (완료)':''}`;
}
function tItem(wi,di,bi,ii,v){stateSet(sk(wi,di,bi,ii),v);const l=document.querySelector(`label[for="cb${wi}-${di}-${bi}-${ii}"]`);if(l)l.classList.toggle('done',v);refreshDayCompletion(wi,di);updateProg();}
function tWC(wi,ci,v){stateSet(wck(wi,ci),v);const l=document.querySelector(`label[for="wc${wi}-${ci}"]`);if(l)l.classList.toggle('done',v);updateProg();}
function saveMemo(wi,di,v){stateSet(`memo-${wi}-${di}`,v);}
document.addEventListener('DOMContentLoaded',async()=>{await initCloudState();renderTabs();renderWeek();updateProg();});
document.addEventListener('cka-state-updated',()=>{renderWeek();updateProg();});
