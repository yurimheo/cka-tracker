<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKA 합격 플랜</title>
<link rel="stylesheet" href="style.css">
<style>
/* D-Day Hero */
.hero {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 36px 24px; text-align: center;
  margin-bottom: 16px; position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, var(--accent-bg) 0%, transparent 70%);
  pointer-events: none;
}
.hero-label { font-size: 11px; font-weight: 600; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }
.hero-num { font-size: 96px; font-weight: 800; line-height: 1; letter-spacing: -.04em; color: var(--text); margin-bottom: 6px; }
.hero-num.today { color: var(--accent); }
.hero-num.over  { color: var(--red-text); }
.hero-sub { font-size: 16px; color: var(--text2); margin-bottom: 28px; }
.hero-stats { display: flex; justify-content: center; gap: 0; }
.hero-stat { padding: 0 28px; border-right: 1px solid var(--border); text-align: center; }
.hero-stat:last-child { border-right: none; }
.hero-stat-num { font-size: 24px; font-weight: 700; color: var(--text); }
.hero-stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Overall progress */
.prog-wrap { margin-bottom: 24px; }
.prog-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.prog-bar-wrap { position: relative; }
.prog-today {
  position: absolute; top: -5px; width: 2px; height: 16px;
  background: var(--accent); transform: translateX(-50%);
}
.prog-today::after {
  content: '오늘'; position: absolute; top: -18px; left: 50%;
  transform: translateX(-50%); font-size: 10px; color: var(--accent);
  white-space: nowrap; font-weight: 600;
}

/* Timeline */
.timeline { position: relative; }
.timeline::before {
  content: ''; position: absolute; left: 80px; top: 0; bottom: 0;
  width: 1px; background: var(--border);
}
.tl-item { display: flex; margin-bottom: 4px; position: relative; }
.tl-left { width: 80px; flex-shrink: 0; padding-right: 16px; text-align: right; padding-top: 14px; }
.tl-week { font-size: 12px; font-weight: 700; color: var(--text); }
.tl-dates { font-size: 10px; color: var(--text3); margin-top: 2px; }
.tl-dot-wrap { width: 20px; flex-shrink: 0; display: flex; justify-content: center; padding-top: 18px; position: relative; z-index: 1; }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); flex-shrink: 0; }
.tl-right { flex: 1; padding: 8px 0 8px 14px; }
.tl-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px; transition: border .2s;
}
.tl-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
.tl-card.done { opacity: .55; }
.tl-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
.tl-title { font-size: 13px; font-weight: 500; color: var(--text); }
.now-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--accent); color: #fff; margin-left: auto; }
.tl-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tl-tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--bg3); color: var(--text2); }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; text-align: center; }
.stat-val { font-size: 26px; font-weight: 700; color: var(--text); }
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }
</style>
</head>
<body>
<nav>
  <span class="nav-logo">CKA <span>플랜</span></span>
  <div class="nav-links">
    <a class="nav-link active" href="index.html">🏠 <span>홈</span></a>
    <a class="nav-link" href="tracker.html">✅ <span>트래커</span></a>
    <a class="nav-link" href="cheatsheet.html">📌 <span>치트시트</span></a>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="theme-btn">🌙</button>
  </div>
</nav>

<div class="page">
  <div class="page-title">🎯 CKA 합격 플랜</div>
  <div class="page-sub">2026년 6월 29일 시작 · 9월 6일 시험 · 10주 70일</div>

  <!-- D-Day Hero -->
  <div class="hero">
    <div class="hero-label">CKA 시험까지</div>
    <div class="hero-num" id="dday-num">-</div>
    <div class="hero-sub" id="dday-sub">일 남았어요</div>
    <div class="hero-stats">
      <div class="hero-stat"><div class="hero-stat-num" id="stat-weeks">-</div><div class="hero-stat-lbl">주 남음</div></div>
      <div class="hero-stat"><div class="hero-stat-num" id="stat-hrs">-</div><div class="hero-stat-lbl">시간</div></div>
      <div class="hero-stat"><div class="hero-stat-num" id="stat-mins">-</div><div class="hero-stat-lbl">분</div></div>
    </div>
  </div>

  <!-- Overall Progress -->
  <div class="card prog-wrap">
    <div class="prog-head"><span>시작 6/29</span><span id="prog-pct">0%</span><span>시험 9/6</span></div>
    <div class="prog-bar-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-today" id="prog-today" style="left:0%"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val">10주</div><div class="stat-lbl">전체 기간</div></div>
    <div class="stat-card"><div class="stat-val">~27h</div><div class="stat-lbl">주당 학습</div></div>
    <div class="stat-card"><div class="stat-val">67개</div><div class="stat-lbl">따배쿠+씨</div></div>
    <div class="stat-card"><div class="stat-val">60+</div><div class="stat-lbl">KK 랩</div></div>
  </div>

  <!-- Timeline -->
  <div class="section">
    <div class="sec-label">10주 로드맵</div>
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<script src="common.js"></script>
<script>
const START = new Date('2026-06-29T00:00:00');
const EXAM  = new Date('2026-09-06T09:00:00');
const TOTAL_MS = EXAM - START;

const WEEKS = [
  {w:'W1',dates:'6/29~7/5', phase:'기초',  color:'#378ADD', bc:'badge-blue',   theme:'Core Concepts 기초 완성',          tags:['따배쿠 9개','따배씨 5개','KK 6랩','Core Concepts']},
  {w:'W2',dates:'7/6~7/12', phase:'기초',  color:'#378ADD', bc:'badge-blue',   theme:'Pod 심화 + Scheduling',            tags:['따배쿠 7개','따배씨 3개','KK 6랩','Scheduling']},
  {w:'W3',dates:'7/13~7/20',phase:'기초',  color:'#7F77DD', bc:'badge-purple', theme:'Controller 완성 + ✈️ 여행',         tags:['7/17~20 여행','따배쿠 7개','KK 4랩']},
  {w:'W4',dates:'7/21~7/26',phase:'심화',  color:'#639922', bc:'badge-green',  theme:'App Lifecycle + Networking 돌입',  tags:['따배쿠 6개','따배씨 4개','KK 9랩']},
  {w:'W5',dates:'7/27~8/2', phase:'심화',  color:'#639922', bc:'badge-green',  theme:'Networking 완성 + Cluster Maintenance', tags:['따배씨 4개','KK 8랩','etcd 백업 ⭐']},
  {w:'W6',dates:'8/3~8/9',  phase:'심화',  color:'#639922', bc:'badge-green',  theme:'Storage + 중간점검 + Security 진입', tags:['따배씨 4개','KK 8랩','W1~6 중간점검']},
  {w:'W7',dates:'8/10~8/16',phase:'고급',  color:'#E24B4A', bc:'badge-red',    theme:'Security 완성 + Helm + Kustomize', tags:['따배씨 4개','KK 14랩','Helm·Kustomize']},
  {w:'W8',dates:'8/17~8/23',phase:'고급',  color:'#E24B4A', bc:'badge-red',    theme:'Troubleshooting + Mock 1·2·3',     tags:['KK 8랩','Mock 3회','Lightning Lab']},
  {w:'W9',dates:'8/24~8/30',phase:'실전',  color:'#EF9F27', bc:'badge-orange', theme:'Killercoda + killer.sh 세션 1·2',  tags:['Killercoda 8개+','killer.sh 2회','오답 분석']},
  {w:'W10',dates:'8/31~9/6',phase:'시험!', color:'#E24B4A', bc:'badge-red',    theme:'최종 정리 + 🎯 9/6 시험!',          tags:['최종 점검','시험 9/6','합격!']},
];

const W_STARTS = [
  '2026-06-29','2026-07-06','2026-07-13','2026-07-21','2026-07-27',
  '2026-08-03','2026-08-10','2026-08-17','2026-08-24','2026-08-31'
];

function update() {
  const now = new Date();
  const diff = EXAM - now;
  const el = document.getElementById('dday-num');
  const sub = document.getElementById('dday-sub');

  if (diff <= 0) {
    el.textContent = diff === 0 ? 'D-Day' : 'D+' + Math.floor(Math.abs(diff)/86400000);
    el.className = 'hero-num ' + (diff === 0 ? 'today' : 'over');
    sub.textContent = diff === 0 ? '오늘이 시험날이에요! 파이팅! 💪' : '시험이 끝났어요!';
    document.getElementById('stat-weeks').textContent = '-';
    document.getElementById('stat-hrs').textContent = '-';
    document.getElementById('stat-mins').textContent = '-';
  } else {
    const days = Math.floor(diff / 86400000);
    const hrs  = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    el.textContent = days;
    el.className = 'hero-num';
    sub.textContent = '일 남았어요';
    document.getElementById('stat-weeks').textContent = (days/7).toFixed(1);
    document.getElementById('stat-hrs').textContent = hrs;
    document.getElementById('stat-mins').textContent = mins;
  }

  const elapsed = Math.min(TOTAL_MS, Math.max(0, now - START));
  const pct = Math.round(elapsed / TOTAL_MS * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-today').style.left = pct + '%';
}

function renderTimeline() {
  const now = new Date();
  document.getElementById('timeline').innerHTML = WEEKS.map((w, i) => {
    const ws = new Date(W_STARTS[i]);
    const we = new Date(W_STARTS[i+1] || '2026-09-07');
    const isDone   = now >= we;
    const isActive = now >= ws && now < we;
    return `<div class="tl-item">
      <div class="tl-left"><div class="tl-week">${w.w}</div><div class="tl-dates">${w.dates}</div></div>
      <div class="tl-dot-wrap"><div class="tl-dot" style="background:${isDone||isActive?w.color:'var(--border2)'}"></div></div>
      <div class="tl-right">
        <div class="tl-card${isActive?' active':''}${isDone?' done':''}">
          <div class="tl-head">
            <span class="badge ${w.bc}">${w.phase}</span>
            <span class="tl-title">${w.theme}</span>
            ${isActive ? '<span class="now-pill">진행 중</span>' : ''}
          </div>
          <div class="tl-tags">${w.tags.map(t=>`<span class="tl-tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

update();
setInterval(update, 1000);
renderTimeline();
</script>
</body>
</html>
