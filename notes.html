<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKA 필기노트</title>
<link rel="stylesheet" href="style.css">
<style>
.notes-shell { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 12px; align-items: start; }
.notes-toolbar {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px;
}
.note-btn {
  border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); color: var(--text2);
  font-family: inherit; font-size: 12px; font-weight: 600; padding: 7px 10px; cursor: pointer;
}
.note-btn:hover { background: var(--bg3); color: var(--text); }
.note-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.note-pane { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-height: 520px; }
.pane-head {
  height: 38px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); padding: 0 12px; font-size: 12px; font-weight: 700; color: var(--text2);
}
.note-status { font-size: 11px; color: var(--text3); font-weight: 500; }
.note-editor {
  width: 100%; min-height: 520px; border: 0; resize: vertical; outline: none;
  background: var(--bg2); color: var(--text); font: 13px/1.65 'SF Mono','Fira Code','Consolas',monospace;
  padding: 14px; display: block;
}
.note-preview {
  min-height: 520px; padding: 18px; color: var(--text); overflow-wrap: anywhere;
}
.note-preview h1, .note-preview h2, .note-preview h3 { line-height: 1.25; margin: 18px 0 8px; color: var(--text); }
.note-preview h1 { font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 0; }
.note-preview h2 { font-size: 18px; }
.note-preview h3 { font-size: 15px; }
.note-preview p { margin: 8px 0; color: var(--text2); }
.note-preview ul, .note-preview ol { margin: 8px 0 12px 20px; color: var(--text2); }
.note-preview li { margin: 3px 0; }
.note-preview blockquote { border-left: 3px solid var(--accent); margin: 10px 0; padding: 6px 10px; background: var(--accent-bg); color: var(--text2); }
.note-preview pre { background: #0f0f0e; color: #e0e0da; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 10px 0; }
[data-theme="dark"] .note-preview pre { background: #080807; }
.note-preview code { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: .92em; background: var(--bg3); border-radius: 4px; padding: 1px 4px; }
.note-preview pre code { background: transparent; padding: 0; }
.note-preview a { color: var(--accent); text-decoration: none; }
.note-preview a:hover { text-decoration: underline; }
.note-preview table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
.note-preview th, .note-preview td { border: 1px solid var(--border); padding: 7px 8px; text-align: left; vertical-align: top; }
.note-preview th { background: var(--bg3); color: var(--text); }
.note-preview hr { border: 0; border-top: 1px solid var(--border); margin: 16px 0; }
.file-input { display: none; }
@media (max-width: 820px) {
  .notes-shell { grid-template-columns: 1fr; }
  .note-pane, .note-editor, .note-preview { min-height: 420px; }
}
</style>
</head>
<body>
<nav>
  <span class="nav-logo">CKA <span>플랜</span></span>
  <div class="nav-links">
    <a class="nav-link" href="index.html">🏠 <span>홈</span></a>
    <a class="nav-link" href="tracker.html">✅ <span>트래커</span></a>
    <a class="nav-link" href="cheatsheet.html">📌 <span>치트시트</span></a>
    <a class="nav-link active" href="notes.html">📝 <span>필기노트</span></a>
    <a class="nav-link" href="links.html">🔗 <span>링크</span></a>
  </div>
  <div class="nav-right">
    <button class="theme-btn" id="theme-btn">🌙</button>
  </div>
</nav>

<div class="page">
  <div class="page-title">📝 CKA 필기노트</div>
  <div class="page-sub">Markdown notes · notes.md sync · Obsidian ready</div>

  <div class="notes-toolbar">
    <button class="note-btn primary" id="save-btn">저장</button>
    <button class="note-btn" id="load-md-btn">GitHub 노트 불러오기</button>
    <button class="note-btn" id="download-btn">MD 다운로드</button>
    <button class="note-btn" id="import-btn">MD 가져오기</button>
    <button class="note-btn" id="copy-btn">복사</button>
    <input class="file-input" id="file-input" type="file" accept=".md,.markdown,text/markdown,text/plain">
  </div>

  <div class="notes-shell">
    <section class="note-pane">
      <div class="pane-head"><span>편집</span><span class="note-status" id="note-status">준비됨</span></div>
      <textarea class="note-editor" id="note-editor" spellcheck="false"></textarea>
    </section>
    <section class="note-pane">
      <div class="pane-head"><span>미리보기</span><span class="note-status">Markdown</span></div>
      <div class="note-preview" id="note-preview"></div>
    </section>
  </div>
</div>

<script src="common.js"></script>
<script>
const NOTE_KEY = 'cka-notes-md-v1';
const STARTER_NOTE = `# CKA 필기노트

## 오늘의 핵심

-

## 오답 노트

| 날짜 | 주제 | 틀린 이유 | 다시 풀 커맨드 |
| --- | --- | --- | --- |
|  |  |  |  |

## 자주 헷갈리는 커맨드

\`\`\`bash
kubectl get pods -A -o wide
kubectl describe pod <pod> -n <namespace>
\`\`\`

## 공식문서 링크

- [Kubernetes Documentation](https://kubernetes.io/docs/)
`;

const editor = document.getElementById('note-editor');
const preview = document.getElementById('note-preview');
const statusEl = document.getElementById('note-status');

function setStatus(text) {
  statusEl.textContent = text;
}

function escapeHtml(text) {
  return text.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function renderInline(text) {
  let out = escapeHtml(text);
  out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  out = out.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return out;
}

function isTableLine(line) {
  return /^\s*\|.+\|\s*$/.test(line);
}

function isTableDivider(line) {
  return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
}

function renderTable(lines) {
  const rows = lines.map(line => line.trim().replace(/^\||\|$/g, '').split('|').map(cell => cell.trim()));
  const hasHead = rows.length > 1 && isTableDivider(lines[1]);
  const bodyRows = hasHead ? rows.slice(2) : rows;
  const head = hasHead ? '<thead><tr>' + rows[0].map(cell => '<th>' + renderInline(cell) + '</th>').join('') + '</tr></thead>' : '';
  const body = '<tbody>' + bodyRows.map(row => '<tr>' + row.map(cell => '<td>' + renderInline(cell) + '</td>').join('') + '</tr>').join('') + '</tbody>';
  return '<table>' + head + body + '</table>';
}

function renderMarkdown(md) {
  const lines = md.replace(/\r\n/g, '\n').split('\n');
  const html = [];
  let paragraph = [];
  let list = null;
  let code = false;
  let codeLines = [];
  let tableLines = [];

  function flushParagraph() {
    if (paragraph.length) {
      html.push('<p>' + renderInline(paragraph.join(' ')) + '</p>');
      paragraph = [];
    }
  }
  function flushList() {
    if (list) {
      html.push('<' + list.type + '>' + list.items.join('') + '</' + list.type + '>');
      list = null;
    }
  }
  function flushTable() {
    if (tableLines.length) {
      html.push(renderTable(tableLines));
      tableLines = [];
    }
  }
  function closeBlocks() {
    flushParagraph();
    flushList();
    flushTable();
  }

  lines.forEach(line => {
    if (/^```/.test(line.trim())) {
      if (code) {
        html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
        code = false;
        codeLines = [];
      } else {
        closeBlocks();
        code = true;
      }
      return;
    }
    if (code) {
      codeLines.push(line);
      return;
    }

    if (isTableLine(line)) {
      flushParagraph();
      flushList();
      tableLines.push(line);
      return;
    }
    flushTable();

    if (!line.trim()) {
      closeBlocks();
      return;
    }
    const heading = /^(#{1,3})\s+(.+)$/.exec(line);
    if (heading) {
      closeBlocks();
      html.push('<h' + heading[1].length + '>' + renderInline(heading[2]) + '</h' + heading[1].length + '>');
      return;
    }
    if (/^---+$/.test(line.trim())) {
      closeBlocks();
      html.push('<hr>');
      return;
    }
    const quote = /^>\s?(.+)$/.exec(line);
    if (quote) {
      closeBlocks();
      html.push('<blockquote>' + renderInline(quote[1]) + '</blockquote>');
      return;
    }
    const unordered = /^\s*[-*]\s+(.+)$/.exec(line);
    const ordered = /^\s*\d+\.\s+(.+)$/.exec(line);
    if (unordered || ordered) {
      flushParagraph();
      const type = unordered ? 'ul' : 'ol';
      if (!list || list.type !== type) flushList();
      if (!list) list = { type, items: [] };
      list.items.push('<li>' + renderInline((unordered || ordered)[1]) + '</li>');
      return;
    }
    paragraph.push(line.trim());
  });

  if (code) html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
  closeBlocks();
  return html.join('');
}

function updatePreview() {
  preview.innerHTML = renderMarkdown(editor.value);
}

function saveNote() {
  localStorage.setItem(NOTE_KEY, editor.value);
  setStatus('저장됨');
}

async function loadRepoNote() {
  try {
    const res = await fetch('notes.md?v=' + Date.now());
    if (!res.ok) throw new Error('not found');
    editor.value = await res.text();
    saveNote();
    updatePreview();
    setStatus('notes.md 불러옴');
  } catch(e) {
    setStatus('불러오기 실패');
  }
}

function downloadNote() {
  const blob = new Blob([editor.value], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cka-notes.md';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  setStatus('다운로드됨');
}

async function copyNote() {
  try {
    await navigator.clipboard.writeText(editor.value);
    setStatus('복사됨');
  } catch(e) {
    setStatus('복사 실패');
  }
}

function importFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    editor.value = String(reader.result || '');
    saveNote();
    updatePreview();
    setStatus('가져옴');
  };
  reader.readAsText(file);
}

editor.addEventListener('input', () => {
  localStorage.setItem(NOTE_KEY, editor.value);
  updatePreview();
  setStatus('자동 저장됨');
});

document.getElementById('save-btn').addEventListener('click', saveNote);
document.getElementById('load-md-btn').addEventListener('click', loadRepoNote);
document.getElementById('download-btn').addEventListener('click', downloadNote);
document.getElementById('copy-btn').addEventListener('click', copyNote);
document.getElementById('import-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', event => {
  const file = event.target.files && event.target.files[0];
  if (file) importFile(file);
  event.target.value = '';
});

document.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem(NOTE_KEY);
  if (saved !== null) {
    editor.value = saved;
    setStatus('로컬 노트');
  } else {
    editor.value = STARTER_NOTE;
    await loadRepoNote();
  }
  updatePreview();
});
</script>
</body>
</html>
